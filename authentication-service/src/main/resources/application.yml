spring:
  application:
    name: authentication-service
  config:
    import: optional:file:./secrets/oauth-secrets.properties
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: email,profile
            redirect-uri: ${GOOGLE_OAUTH_CALLBACK_URI:http://localhost:8081/login/oauth2/code/google}

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:local-dev-jwt-secret-change-me-before-production-1234567890}
    expiration-minutes: 180
  oauth2:
    redirect-uri: ${FRONTEND_GOOGLE_REDIRECT:http://localhost:4200/oauth-success}

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:4200}

services:
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://user-service}
