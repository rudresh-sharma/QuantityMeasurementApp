spring:
  application:
    name: authentication-service
  config:
    import: optional:file:./secrets/oauth-secrets.properties
  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: ${GOOGLE_OAUTH_CALLBACK_URI:http://localhost:8081/login/oauth2/code/google}

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

auth:
  jwt:
    secret: 1234567890123456789012345678901234567890123456789012345678901234
    expiration-minutes: 180
  oauth2:
    redirect-uri: ${FRONTEND_GOOGLE_REDIRECT:http://localhost:3000/oauth-success}

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:3000}

services:
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:8083}
