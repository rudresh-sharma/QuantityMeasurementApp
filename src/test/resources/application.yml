spring:
  datasource:
    url: jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

  sql:
    init:
      mode: never

logging:
  level:
    root: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
