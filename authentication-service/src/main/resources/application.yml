spring:
  application:
    name: authentication-service
  config:
    import: optional:file:./secrets/oauth-secrets.properties

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:1234567890123456789012345678901234567890123456789012345678901234}
    expiration-minutes: 180
  oauth2:
    redirect-uri: ${FRONTEND_GOOGLE_REDIRECT:http://localhost:3000/oauth-success}

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:4200}

services:
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:8083}
